services:
  - type: web
    name: stock-tracker-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm rebuild sqlite3 --build-from-source && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
